---
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.11.1"
        required: true
        default: "1.11.1"

permissions:
  contents: write

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          if [[ "${version}" != "$(cat VERSION)" ]]; then
            echo "Requested version ${version} does not match VERSION $(cat VERSION)" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Test
        run: make test

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.asset_arch }}
    runs-on: ubuntu-latest
    needs: [prepare, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goamd64: v1
            asset_arch: amd64
          - goos: linux
            goarch: amd64
            goamd64: v1
            asset_arch: kylin-c86
          - goos: linux
            goarch: arm64
            asset_arch: arm64
          - goos: linux
            goarch: "386"
            asset_arch: "386"
          - goos: linux
            goarch: arm
            goarm: "7"
            asset_arch: armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          MATRIX_GOAMD64: ${{ matrix.goamd64 }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          if [[ -n "${MATRIX_GOAMD64}" ]]; then
            export GOAMD64="${MATRIX_GOAMD64}"
          fi
          revision="$(git rev-parse --short=12 HEAD)"
          branch="${GITHUB_REF_NAME}"
          build_date="$(date -u +%Y%m%d-%H:%M:%S)"
          ldflags="
          -X github.com/prometheus/common/version.Version=${VERSION}
          -X github.com/prometheus/common/version.Revision=${revision}
          -X github.com/prometheus/common/version.Branch=${branch}
          -X github.com/prometheus/common/version.BuildUser=github-actions
          -X github.com/prometheus/common/version.BuildDate=${build_date}
          "
          go build -trimpath -ldflags "${ldflags}" -o "dist/node_exporter" .

      - name: Package
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GOOS: ${{ matrix.goos }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          set -euo pipefail
          package="monitor-agent-${VERSION}.${GOOS}-${ASSET_ARCH}"
          mkdir -p "${package}"
          cp dist/node_exporter "${package}/node_exporter"
          cp LICENSE NOTICE "${package}/"
          tar -czf "${package}.tar.gz" "${package}"
          sha256sum "${package}.tar.gz" > "${package}.tar.gz.sha256"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: monitor-agent-${{ needs.prepare.outputs.version }}.${{ matrix.goos }}-${{ matrix.asset_arch }}
          path: |
            monitor-agent-${{ needs.prepare.outputs.version }}.${{ matrix.goos }}-${{ matrix.asset_arch }}.tar.gz
            monitor-agent-${{ needs.prepare.outputs.version }}.${{ matrix.goos }}-${{ matrix.asset_arch }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: monitor agent ${{ needs.prepare.outputs.version }}
          files: release-assets/*
